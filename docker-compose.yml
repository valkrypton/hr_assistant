services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    restart: on-failure
    volumes:
      - ./data/chroma:/app/data/chroma
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hr_assistant
      POSTGRES_USER: hr_assistant
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_assistant"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
