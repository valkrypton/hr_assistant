<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f4f5f7;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 32px;
      width: 100%;
      max-width: 680px;
    }

    h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 24px; color: #111; }

    textarea {
      width: 100%;
      height: 100px;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      resize: vertical;
      outline: none;
      transition: border-color .2s;
    }
    textarea:focus { border-color: #6366f1; }

    button {
      margin-top: 12px;
      padding: 10px 24px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { opacity: .55; cursor: default; }

    #result {
      margin-top: 24px;
      padding: 16px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.95rem;
      line-height: 1.6;
      white-space: pre-wrap;
      min-height: 60px;
      color: #374151;
      display: none;
    }
    #result.error { color: #dc2626; background: #fef2f2; border-color: #fecaca; }
    #result.loading { color: #6b7280; font-style: italic; }
  </style>
</head>
<body>
  <div class="card">
    <h1>HR Assistant</h1>

    <textarea id="query" placeholder="Ask anything about employees, payroll, attendance…"></textarea>
    <button id="submit">Ask</button>

    <div id="result"></div>
  </div>

  <script>
    const API = 'http://localhost:8000/query';
    const btn = document.getElementById('submit');
    const box = document.getElementById('result');

    document.getElementById('submit').addEventListener('click', async () => {
      const q = document.getElementById('query').value.trim();
      if (!q) return;

      btn.disabled = true;
      box.className = 'loading';
      box.style.display = 'block';
      box.textContent = 'Thinking…';

      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
        box.className = '';
        box.textContent = data.answer;
      } catch (err) {
        box.className = 'error';
        box.textContent = `Error: ${err.message}`;
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById('query').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) btn.click();
    });
  </script>
</body>
</html>
